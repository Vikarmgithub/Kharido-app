apply plugin: 'com.android.application'
// अगर फायरबेस प्लगइन यूज़ कर रहे हैं तो: apply plugin: 'com.google.gms.google-services'

android {
    compileSdkVersion 30 // या जो भी आपका है
    
    defaultConfig {
        applicationId "com.khridoapp.mithai"
        minSdkVersion 21
        targetSdkVersion 30
        // ...
    }

    // 🌟 यहाँ पर हमने जादू वाला कोड फिट कर दिया है
    packagingOptions {
        resources {
            excludes += '/META-INF/{AL2.0,LGPL2.1}'
            excludes += 'META-INF/com.android.tools/proguard/coroutines.pro'
        }
    }
}

dependencies {
    // आपकी बाकी सारी डिपेंडेंसी और फायरबेस की लाइनें
    implementation platform('com.google.firebase:firebase-bom:32.7.0')
    implementation 'com.google.firebase:firebase-auth'
    implementation 'com.google.android.gms:play-services-auth:20.7.0'
}
